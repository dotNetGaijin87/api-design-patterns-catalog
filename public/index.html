<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API デザインパターン — プレイグラウンド</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">{ }</span>
        <div>
          <h1>API デザインパターン</h1>
          <p>インタラクティブなプレイグラウンド — パターンを選び、1リクエストずつ動かして確かめる。</p>
        </div>
      </div>
      <span class="tagline">実際のエンドポイントを、パターンごとに動かす</span>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2 class="sidebar-title">カテゴリ</h2>
        <nav id="patternList" class="pattern-list"></nav>
      </aside>

      <section id="detail" class="detail">
        <p class="loading">パターンを読み込み中…</p>
      </section>

      <section class="console-pane">
        <div class="console-head">
          <h2 class="console-title">リクエスト / レスポンス</h2>
          <button id="clearConsole" class="clear-btn">クリア</button>
        </div>
        <div id="console" class="console"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
